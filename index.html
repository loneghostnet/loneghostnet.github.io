  <style>
  body {
    margin: 0;
    padding: 20px;
    background: #0a0a0a;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    color: #aaa;
    font-family: 'Roboto', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  #output {
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-top: 56px;
  }
  .st {
    color: #888;
  }
  .sitch {
    color: #666;
  }
  .ts {
    color: #444;
  }
  .banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 20px 12px;
    background: #0a0a0a;
    color: #0f0;
    font-weight: bold;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="banner">Welcome to LoneGhost.Net</div>
<div id="output"></div>

<script>
const out = document.getElementById('output');

function log(text) {
  const span = document.createElement('div');
  span.innerHTML = text;
  out.appendChild(span);
  window.scrollTo(0, document.body.scrollHeight);
}

const colors = [
  '#32CD32', '#FFD700', '#9370DB', '#00CED1', '#FF6B6B',
  '#00FF7F', '#FF69B4', '#00BFFF', '#FF4500', '#7B68EE',
];

function randomColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

document.addEventListener('click', () => {
  const c = randomColor();
  document.body.style.background = c;
  document.querySelector('.banner').style.background = c;
  setTimeout(() => {
    document.body.style.background = '#0a0a0a';
    document.querySelector('.banner').style.background = '#0a0a0a';
  }, 100);
});

const alpha = 'AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz0123456789'.split('');

function genAns() {
  let s = '';
  for (let i = 0; i < 5 + Math.floor(Math.random() * 2); i++) {
    s += alpha[Math.floor(Math.random() * alpha.length)];
  }
  return s;
}

function genLetters(n) {
  let s = '';
  const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let i = 0; i < n; i++) {
    s += letters[Math.floor(Math.random() * letters.length)];
  }
  return s;
}

let diction = [];

function generateResult() {
  const d = new Date();
  const ts = d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0') + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0') + ':' +
    String(d.getSeconds()).padStart(2, '0') + '.' +
    String(d.getMilliseconds()).padStart(3, '0');
  const ans = genAns();
  const sitch = (Math.random() * 9999).toFixed(4);
  const k = 1 + Math.floor(Math.random() * 9);
  let words = [];
  for (let i = 0; i < k; i++) {
    words.push(diction[Math.floor(Math.random() * diction.length)]);
  }
  const kchat = words.join('  ');
  const c = randomColor();
  log(`<span class="st"> st</span> ${ans} <span class="sitch">${sitch}</span> <span style="color:${c}">${kchat}</span> <span class="ts">${ts}</span>`);
}

async function fetchDiction() {
  try {
    const resp = await fetch('diction.json');
    diction = await resp.json();
  } catch {
    diction = [
      "alpha", "beta", "gamma", "delta", "epsilon", "zeta", "eta", "theta",
      "iota", "kappa", "lambda", "mu", "nu", "xi", "omicron", "pi", "rho",
      "sigma", "tau", "upsilon", "phi", "chi", "psi", "omega",
      "nebula", "cosmos", "quantum", "photon", "pulse", "wave", "drift",
      "echo", "flux", "grid", "halo", "iris", "jade", "kite", "lens",
      "mist", "node", "orbit", "prism", "ridge", "spire", "trace", "unity",
      "veil", "void", "wisp", "zenith", "arc", "bloom", "cipher", "dune",
      "ember", "frost", "glade", "haze", "inlet", "knoll", "lunar", "marsh",
      "noir", "opal", "peak", "quartz", "raven", "shade", "thorn", "umbra",
      "vale", "vale", "whorl", "xeno", "yield", "zephyr"
    ];
  }
  loop();
}

function loop() {
  const delay = Math.floor(Math.random() * 5000);
  setTimeout(() => {
    const int = Math.floor(Math.random() * 26);
    if (int > 15 && Math.random() > 0.5) {
      generateResult();
    }
    loop();
  }, delay);
}

fetchDiction();
</script>
