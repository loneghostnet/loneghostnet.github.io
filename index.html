  <style>
  body {
    margin: 0;
    padding: 20px;
    background: #0a0a0a;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    color: #aaa;
    font-family: 'Roboto', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  #output {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 20px 20px 40px;
    z-index: 10;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .st {
    color: #888;
  }
  .sitch {
    color: #666;
  }
  .ts {
    color: #aaa;
  }
  .banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 20px 14px;
    color: #ff0;
    font-weight: bold;
    z-index: 99;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #ssToggleBtn {
    background: none;
    border: 1px solid rgba(255,255,255,.2);
    color: #ff0;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    padding: 2px 8px;
    line-height: 1;
    margin-left: 6px;
  }
  #ssToggleBtn:hover {
    border-color: #ff0;
  }
  #ssToggleBtn.off {
    color: #444;
    border-color: #333;
  }
  #clearBtn {
    background: none;
    border: 1px solid rgba(255,255,255,.2);
    color: #ff0;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    padding: 2px 8px;
    line-height: 1;
  }
  #clearBtn:hover {
    border-color: #ff0;
  }
  .ss-bg {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: #0a0a0a;
  }
  .ss-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .ss-bg img.loaded {
    opacity: 1;
  }
  .ss-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: rgba(0, 0, 0, 0.65);
  }
  #flashLayer {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background: transparent;
    transition: background 0s;
  }
  .banner {
    z-index: 10;
  }
  #output {
    z-index: 10;
    text-shadow: 0 1px 4px rgba(0,0,0,.8), 0 0 12px rgba(0,0,0,.6);
  }
  .ss-view {
    flex: 1;
    overflow: hidden;
    padding: 6px 8px 4px;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .ss-img {
    flex: 1;
    width: 100%;
    object-fit: cover;
    border-radius: 3px;
    min-height: 80px;
    background: #1a1a1a;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ss-img.loaded {
    opacity: 1;
  }
  .ss-place {
    flex: 1;
    width: 100%;
    min-height: 80px;
    background: #1a1a1a;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 11px;
    text-align: center;
    padding: 8px;
    box-sizing: border-box;
  }
  .ss-ctrl {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 8px 8px;
    border-top: 1px solid #222;
    position: relative;
  }
  .ss-resize {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 14px;
    height: 14px;
    cursor: nwse-resize;
    z-index: 5;
  }
  .ss-resize::after {
    content: '';
    position: absolute;
    left: 2px;
    bottom: 2px;
    width: 8px;
    height: 8px;
    border-left: 2px solid #444;
    border-bottom: 2px solid #444;
  }
  .ss-resize:hover::after {
    border-color: #0f0;
  }
  .ss-ctrl button {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 10px;
    line-height: 1.6;
  }
  .ss-ctrl button:hover {
    background: #2a2a2a;
    color: #0f0;
  }
  .ss-ctrl .ss-num {
    font-size: 11px;
    color: #555;
    min-width: 40px;
    text-align: center;
  }
  @media (max-width: 640px) {
    .ss-wrap {
      width: 140px;
      right: 6px;
      top: 48px;
      font-size: 11px;
    }
    .ss-ctrl button { font-size: 10px; padding: 1px 4px; }
  }
</style>
</head>
<body>
<div class="banner">Welcome to LoneGhost.Net <span style="flex:1"></span><button id="clearBtn" title="Clear output" tabindex="-1">CLR</button><button id="ssToggleBtn" title="Toggle slideshow" tabindex="-1">&#x25C9; SS</button></div>
<div class="ss-bg" id="ssBg"><img id="ssImg" alt="" /></div>
<div class="ss-overlay" id="ssOverlay"></div>
<div id="flashLayer"></div>
<div id="output"></div>

<script>
const out = document.getElementById('output');

function log(text) {
  const span = document.createElement('div');
  span.innerHTML = text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

const colors = [
  '#32CD32', '#FFD700', '#9370DB', '#00CED1', '#FF6B6B',
  '#00FF7F', '#FF69B4', '#00BFFF', '#FF4500', '#7B68EE',
];

function randomColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

function flash() {
  const c = randomColor();
  document.getElementById('flashLayer').style.background = c;
  setTimeout(() => {
    document.getElementById('flashLayer').style.background = 'transparent';
  }, 100);
}

document.addEventListener('click', flash);
document.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); flash(); } });

const alpha = 'AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz0123456789'.split('');

function genAns() {
  let s = '';
  for (let i = 0; i < 5 + Math.floor(Math.random() * 2); i++) {
    s += alpha[Math.floor(Math.random() * alpha.length)];
  }
  return s;
}

function genLetters(n) {
  let s = '';
  const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let i = 0; i < n; i++) {
    s += letters[Math.floor(Math.random() * letters.length)];
  }
  return s;
}

let diction = [];

function generateResult() {
  const d = new Date();
  const ts = d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0') + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0') + ':' +
    String(d.getSeconds()).padStart(2, '0') + '.' +
    String(d.getMilliseconds()).padStart(3, '0');
  const ans = genAns();
  const sitch = (Math.random() * 9999).toFixed(4);
  const k = 1 + Math.floor(Math.random() * 9);
  let words = [];
  for (let i = 0; i < k; i++) {
    words.push(diction[Math.floor(Math.random() * diction.length)]);
  }
  const kchat = words.join('  ');
  const c = randomColor();
  log(`<span class="st"> st</span> ${ans} <span class="sitch">${sitch}</span> <span style="color:${c}">${kchat}</span> <span class="ts">${ts}</span>`);
}

async function fetchDiction() {
  try {
    const resp = await fetch('diction.json');
    diction = await resp.json();
  } catch {
    diction = [
      "alpha", "beta", "gamma", "delta", "epsilon", "zeta", "eta", "theta",
      "iota", "kappa", "lambda", "mu", "nu", "xi", "omicron", "pi", "rho",
      "sigma", "tau", "upsilon", "phi", "chi", "psi", "omega",
      "nebula", "cosmos", "quantum", "photon", "pulse", "wave", "drift",
      "echo", "flux", "grid", "halo", "iris", "jade", "kite", "lens",
      "mist", "node", "orbit", "prism", "ridge", "spire", "trace", "unity",
      "veil", "void", "wisp", "zenith", "arc", "bloom", "cipher", "dune",
      "ember", "frost", "glade", "haze", "inlet", "knoll", "lunar", "marsh",
      "noir", "opal", "peak", "quartz", "raven", "shade", "thorn", "umbra",
      "vale", "vale", "whorl", "xeno", "yield", "zephyr"
    ];
  }
  loop();
}

function loop() {
  const delay = Math.floor(Math.random() * 5000);
  setTimeout(() => {
    const int = Math.floor(Math.random() * 26);
    if (int > 15 && Math.random() > 0.5) {
      generateResult();
    }
    loop();
  }, delay);
}

fetchDiction();

// --- Slideshow ---
const ssImg = document.getElementById('ssImg');
let posts = [];
let idx = 0;
let paused = false;
let ssTimer = null;
const SS_DELAY = 8000;
let preloaded = new Set();

function ssPreload(n) {
  for (let i = 1; i <= n; i++) {
    const pi = (idx + i) % posts.length;
    const url = posts[pi];
    if (url && !preloaded.has(url)) {
      preloaded.add(url);
      const link = document.createElement('link');
      link.rel = 'preload';
      link.as = 'image';
      link.href = url;
      document.head.appendChild(link);
    }
  }
}

let ssTimerId = null;

function ssShow() {
  if (!posts.length) return;
  const url = posts[idx];
  if (ssImg.src !== url) {
    if (ssTimerId) { clearTimeout(ssTimerId); ssTimerId = null; }
    ssImg.classList.remove('loaded');
    setTimeout(() => {
      ssImg.src = url;
      ssTimerId = setTimeout(() => {
        ssImg.classList.add('loaded');
      }, 500);
    }, 300);
  } else {
    ssImg.classList.add('loaded');
  }
  ssPreload(3);
}

ssImg.addEventListener('load', () => {
  ssImg.classList.add('loaded');
});

function ssRefresh() {
  window.tumblr_api_read = null;
  const s = document.createElement('script');
  s.src = 'https://kredtidy.tumblr.com/api/read/json?num=50&t=' + Date.now();
  s.onerror = () => { if (!paused) ssTimer = setInterval(ssNext, SS_DELAY); };
  document.head.appendChild(s);
  const iv = setInterval(() => {
    if (!window.tumblr_api_read) return;
    clearInterval(iv);
    const raw = window.tumblr_api_read;
    function extractImg(post) {
      if (post['photo-url-1280']) return post['photo-url-1280'];
      if (post['photo-url-500']) return post['photo-url-500'];
      const body = post['regular-body'] || post['photo-caption'] || '';
      if (!body) return '';
      const doc = new DOMParser().parseFromString(body, 'text/html');
      const img = doc.querySelector('img');
      return img ? img.src : '';
    }
    const fresh = (raw.posts || []).map(p => extractImg(p)).filter(Boolean);
    const merged = [...fresh];
    for (const url of posts) {
      if (!merged.includes(url)) merged.push(url);
    }
    for (let i = merged.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [merged[i], merged[j]] = [merged[j], merged[i]];
    }
    posts = merged.slice(0, 30);
    preloaded.clear();
    ssShow();
    if (!paused) ssTimer = setInterval(ssNext, SS_DELAY);
  }, 300);
  setTimeout(() => { clearInterval(iv); if (!paused) ssTimer = setInterval(ssNext, SS_DELAY); }, 8000);
}

function ssNext() {
  if (!posts.length) return;
  idx = (idx + 1) % posts.length;
  if (idx === 0) {
    ssRefresh();
    return;
  }
  if (!paused) { if (ssTimer) clearInterval(ssTimer); ssTimer = setInterval(ssNext, SS_DELAY); }
  ssShow();
}

function ssPrev() {
  if (!posts.length) return;
  idx = (idx - 1 + posts.length) % posts.length;
  if (!paused) { if (ssTimer) clearInterval(ssTimer); ssTimer = setInterval(ssNext, SS_DELAY); }
  ssShow();
}

function ssToggle() {
  if (!ssVisible) return;
  paused = !paused;
  if (paused) {
    if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
  } else {
    ssTimer = setInterval(ssNext, SS_DELAY);
  }
}

const ssToggleBtn = document.getElementById('ssToggleBtn');
const ssBg = document.getElementById('ssBg');
const ssOverlay = document.getElementById('ssOverlay');
let ssVisible = true;
let ssDisabled = false;

function ssDisable() {
  ssDisabled = true;
  ssVisible = false;
  ssBg.style.display = 'none';
  ssOverlay.style.display = 'none';
  ssToggleBtn.className = 'off';
  if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
  paused = true;
  ssImg.classList.remove('loaded');
}

ssToggleBtn.addEventListener('click', () => {
  if (ssDisabled) return;
  ssToggleBtn.blur();
  ssVisible = !ssVisible;
  ssBg.style.display = ssVisible ? '' : 'none';
  ssOverlay.style.display = ssVisible ? '' : 'none';
  ssToggleBtn.className = ssVisible ? '' : 'off';
  if (!ssVisible) {
    if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
    paused = true;
    ssImg.classList.remove('loaded');
  } else {
    paused = false;
    ssTimer = setInterval(ssNext, SS_DELAY);
    ssImg.classList.add('loaded');
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('clearBtn').blur();
  out.innerHTML = '';
  out.scrollTop = 0;
});

document.addEventListener('keydown', e => {
  if (!ssVisible) return;
  if (e.key === ' ') { e.preventDefault(); ssToggle(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); ssPrev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); ssNext(); }
});

(function() {
  const s = document.createElement('script');
  s.src = 'https://kredtidy.tumblr.com/api/read/json?num=50';
  s.onerror = ssDisable;
  document.head.appendChild(s);
  const iv = setInterval(() => {
    if (!window.tumblr_api_read) return;
    clearInterval(iv);
    const raw = window.tumblr_api_read;
    function extractImg(post) {
      if (post['photo-url-1280']) return post['photo-url-1280'];
      if (post['photo-url-500']) return post['photo-url-500'];
      const body = post['regular-body'] || post['photo-caption'] || '';
      if (!body) return '';
      const doc = new DOMParser().parseFromString(body, 'text/html');
      const img = doc.querySelector('img');
      return img ? img.src : '';
    }
    const allPosts = (raw.posts || []).map(p => extractImg(p)).filter(Boolean);
    for (let i = allPosts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allPosts[i], allPosts[j]] = [allPosts[j], allPosts[i]];
    }
    posts = allPosts.slice(0, 30);
    if (posts.length) {
      ssShow();
      ssTimer = setInterval(ssNext, SS_DELAY);
    } else {
      ssDisable();
    }
  }, 300);
  setTimeout(() => { clearInterval(iv); if (!posts.length) ssDisable(); }, 10000);
})();
</script>
</body>
